<div id="game-container">
<div class="flex flex-col items-center justify-center min-h-full p-6 bg-gradient-cozy">
    <div class="text-center max-w-sm">
        <div class="mb-6">
            <div class="text-5xl mb-2">☕</div>
            <h1 class="text-5xl font-bold text-amber-900 mb-1" style="font-family: 'Crimson Text', serif;">Soc Ops</h1>
            <p class="text-lg text-warm italic">Break the ice, find connections</p>
        </div>

        <div class="bg-white rounded-xl p-6 shadow-cozy border border-warm mb-8">
            <h2 class="font-semibold text-gray-900 mb-4 text-lg">How to play</h2>
            <ul class="text-left text-gray-700 text-sm space-y-3">
                <li class="flex items-start">
                    <span class="mr-3 text-lg">🔍</span>
                    <span>Find someone who matches each question</span>
                </li>
                <li class="flex items-start">
                    <span class="mr-3 text-lg">✓</span>
                    <span>Tap a square when you find a match</span>
                </li>
                <li class="flex items-start">
                    <span class="mr-3 text-lg">🎉</span>
                    <span>Get 5 in a row to celebrate!</span>
                </li>
            </ul>
        </div>

        <button
            hx-post="/start"
            hx-target="#game-container"
            hx-swap="outerHTML"
            class="w-full bg-amber-500 hover:bg-amber-600 text-white font-semibold py-4 px-8 rounded-lg text-lg active:scale-98 transition-smooth shadow-cozy">
            Let's play
        </button>
        
        <p class="text-sm text-warm mt-6">Get ready to connect with people around you 🌟</p>
    </div>
</div>
</div>
