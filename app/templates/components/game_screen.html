<div id="game-container">
<div class="flex flex-col min-h-full bg-gradient-cozy">
    <!-- Header -->
    <header class="flex items-center justify-between p-4 bg-white border-b border-warm shadow-sm">
        <button
            hx-post="/reset"
            hx-target="#game-container"
            hx-swap="outerHTML"
            class="text-warm font-semibold px-4 py-2 rounded-lg hover:bg-gray-50 active:scale-98 transition-smooth">
            ← Back
        </button>
        <h1 class="font-bold text-gray-900 text-xl" style="font-family: 'Crimson Text', serif;">☕ Soc Ops</h1>
        <div class="w-16"></div>
    </header>

    <!-- Instructions -->
    <p class="text-center text-warm text-sm py-3 px-4 italic">
        Find someone who matches each square
    </p>

    <!-- Bingo indicator -->
    {% if session.has_bingo %}
    <div class="bg-gradient-to-r from-amber-100 to-amber-50 text-amber-900 text-center py-3 font-semibold text-base shadow-sm">
        🎉 BINGO! You found a line!
    </div>
    {% endif %}

    <!-- Board -->
    <div class="flex-1 flex items-center justify-center p-4">
        {% include "components/bingo_board.html" %}
    </div>
</div>

{% if session.show_bingo_modal %}
    {% include "components/bingo_modal.html" %}
{% endif %}
</div>
