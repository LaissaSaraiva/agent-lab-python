<div class="grid grid-cols-5 gap-2 w-full max-w-md mx-auto aspect-square">
    {% for square in session.board %}
    {% set is_winning = square.id in session.winning_square_ids %}
    <button
        {% if not square.is_free_space %}
        hx-post="/toggle/{{ square.id }}"
        hx-target="#game-container"
        hx-swap="outerHTML"
        {% endif %}
        {% if square.is_free_space %}disabled{% endif %}
        class="relative flex items-center justify-center p-2 text-center border-2 rounded-lg transition-smooth select-none min-h-[70px] text-xs leading-tight font-medium shadow-sm hover:shadow-cozy
        {%- if square.is_marked %}
            {%- if is_winning %} bg-amber-100 border-amber-400 text-amber-900
            {%- else %} bg-green-100 border-green-400 text-green-800
            {%- endif %}
        {%- else %} bg-white text-gray-700 border-gray-200 hover:border-warm active:scale-98
        {%- endif %}
        {%- if square.is_free_space %} font-bold text-sm border-warm bg-amber-50{% endif %}"
        aria-pressed="{{ 'true' if square.is_marked else 'false' }}"
        aria-label="{{ 'Free space' if square.is_free_space else square.text }}">
        <span class="wrap-break-word hyphens-auto">{{ square.text }}</span>
        {% if square.is_marked and not square.is_free_space %}
        <span class="absolute top-1 right-1 text-green-600 text-lg">✓</span>
        {% endif %}
    </button>
    {% endfor %}
</div>
